{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart Details</title>

<link rel="stylesheet" href="{% static 'app1/cart_detail.css' %}">

</head>
<body>

<div class="cart-container">

<h2>Your Cart</h2>

{% if cart %}

<table class="cart-table">

<tr>
<th>Product</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>

{% for item in cart %}

<tr>
<td>{{ item.product.name }}</td>
<td>{{ item.quantity }}</td>
<td>€{{ item.total_price }}</td>

<td>
<a href="{% url 'cart_remove' item.product.id %}" class="btn remove-btn">
Remove
</a>
</td>

</tr>

{% endfor %}

</table>

<p class="cart-total">
<strong>Total: €{{ cart.get_total_price }}</strong>
</p>

<a href="{% url 'checkout' %}" class="btn checkout-btn">
Proceed to Checkout
</a>

{% else %}

<p class="empty-cart">Your cart is empty.</p>

{% endif %}

</div>

</body>
</html>
